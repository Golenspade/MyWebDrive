name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ "**" ]

jobs:
  # Backend build and test
  backend:
    runs-on: ubuntu-latest
    name: Backend (Node.js)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@9.7.0 --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install deps (pnpm workspace)
        run: pnpm -w install --no-frozen-lockfile

      - name: Build all packages/services
        run: pnpm -r --filter ./packages/** --filter ./services/** build

      - name: Prisma generate (all services)
        run: pnpm -r --filter ./services/** prisma:generate || true

      - name: Prisma migrate deploy (sqlite in-repo)
        shell: bash
        run: |
          set -e
          mkdir -p .ci
          echo "auth & user"
          (cd services/auth && DATABASE_URL="file:./prisma/ci.db" npx prisma migrate deploy || npx prisma db push || true)
          (cd services/user && DATABASE_URL="file:./prisma/ci.db" npx prisma migrate deploy || npx prisma db push || true)
          echo "metadata"
          (cd services/metadata && METADATA_DATABASE_URL="file:./prisma/ci.db" npx prisma migrate deploy || npx prisma db push || true)
          echo "storage"
          (cd services/storage && STORAGE_DATABASE_URL="file:./prisma/ci.db" npx prisma migrate deploy || npx prisma db push || true)
          echo "sharing"
          (cd services/sharing && SHARING_DATABASE_URL="file:./prisma/ci.db" npx prisma migrate deploy || npx prisma db push || true)

      - name: Tests (best-effort)
        run: pnpm -r test || true

  # Frontend build and lint
  frontend:
    runs-on: ubuntu-latest
    name: Frontend (Next.js)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@9.7.0 --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install deps (all packages)
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        run: pnpm --filter ./frontend/cruip-landing build

      - name: Lint frontend
        run: pnpm --filter ./frontend/cruip-landing lint || true

      - name: Type check frontend
        run: pnpm --filter ./frontend/cruip-landing typecheck || true
