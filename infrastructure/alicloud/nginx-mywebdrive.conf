# MyWebDrive Nginx Configuration
# Domain: mygoavemujica.top
# Generated for v0.2.0-search-publish-catalog

# Upstream definitions (http context)
upstream mywebdrive_frontend {
    server 127.0.0.1:3100 max_fails=3 fail_timeout=30s;
}

upstream mywebdrive_gateway {
    server 127.0.0.1:9090 max_fails=3 fail_timeout=30s;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name mygoavemujica.top www.mygoavemujica.top;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mygoavemujica.top www.mygoavemujica.top;

    # SSL Certificate (will be auto-configured by certbot)
    # ssl_certificate /etc/letsencrypt/live/mygoavemujica.top/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/mygoavemujica.top/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Upload/Download Optimization
    client_max_body_size 2g;
    client_body_buffer_size 128k;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 60s;

    # Logging
    access_log /var/log/nginx/mywebdrive-access.log;
    error_log /var/log/nginx/mywebdrive-error.log;


    # Frontend (default)
    location / {
        # This frontend only serves pages and static app assets.
        # Reject non-GET/HEAD methods here so bogus POST probes do not reach Next.js.
        limit_except GET HEAD {
            deny all;
        }

        proxy_pass http://mywebdrive_frontend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket support (for Next.js HMR in dev, not needed in prod but harmless)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # API Gateway
    location /api/v1/ {
        proxy_pass http://mywebdrive_gateway;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Disable buffering for uploads
        proxy_request_buffering off;
        proxy_buffering off;

        # Timeouts for long operations
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Static assets (catalog downloads)
    location /assets/ {
        proxy_pass http://mywebdrive_gateway;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Enable buffering for static files
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 128k;

        # Cache headers
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location /health {
        proxy_pass http://mywebdrive_gateway/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Metrics endpoint (optional, restrict access)
    location /metrics {
        proxy_pass http://mywebdrive_gateway/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Restrict to localhost only
        allow 127.0.0.1;
        deny all;
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
