version: '3.8'

# Production Docker Compose for MyWebDrive
# Uses PostgreSQL, new ports (7091-7095, 9090), and production settings

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mywebdrive
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mywebdrive
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage (optional, can use OSS instead)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - mywebdrive
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Auth Service
  auth:
    image: node:20-bullseye
    working_dir: /workspace
    volumes:
      - ../../:/workspace:cached
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      AUTH_PORT: 7091
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/postgres?schema=auth}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-900}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-604800}
      REGISTRATION_REQUIRE_INVITE: ${REGISTRATION_REQUIRE_INVITE:-true}
    command: >
      sh -c "node services/auth/dist/index.js"
    ports:
      - "127.0.0.1:7091:7091"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mywebdrive
    restart: unless-stopped

  # User Service
  user:
    image: node:20-bullseye
    working_dir: /workspace
    volumes:
      - ../../:/workspace:cached
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      USER_PORT: 7092
      USER_DATABASE_URL: ${USER_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/postgres?schema=user}
    command: >
      sh -c "node services/user/dist/index.js"
    ports:
      - "127.0.0.1:7092:7092"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mywebdrive
    restart: unless-stopped

  # Metadata Service
  metadata:
    image: node:20-bullseye
    working_dir: /workspace
    volumes:
      - ../../:/workspace:cached
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      METADATA_PORT: 7093
      METADATA_DATABASE_URL: ${METADATA_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/postgres?schema=metadata}
    command: >
      sh -c "node services/metadata/dist/index.js"
    ports:
      - "127.0.0.1:7093:7093"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mywebdrive
    restart: unless-stopped

  # Storage Service
  storage:
    image: node:20-bullseye
    working_dir: /workspace
    volumes:
      - ../../:/workspace:cached
      - storage_data:/workspace/storage
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      STORAGE_PORT: 7094
      STORAGE_PATH: ./storage
      METADATA_SERVICE_URL: http://metadata:7093
      STORAGE_DATABASE_URL: ${STORAGE_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/postgres?schema=storage}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      USE_MINIO: ${USE_MINIO:-false}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-mywebdrive}
      DOWNLOAD_CONCURRENCY_LIMIT: ${DOWNLOAD_CONCURRENCY_LIMIT:-3}
      DOWNLOAD_Mbps: ${DOWNLOAD_Mbps:-300}
      OWNER_COOKIE_SECRET: ${OWNER_COOKIE_SECRET:-please-change-me}
      OWNER_COOKIE_TTL_SEC: ${OWNER_COOKIE_TTL_SEC:-86400}
    command: >
      sh -c "node services/storage/dist/index.js"
    ports:
      - "127.0.0.1:7094:7094"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      metadata:
        condition: service_started
    networks:
      - mywebdrive
    restart: unless-stopped

  # Sharing Service
  sharing:
    image: node:20-bullseye
    working_dir: /workspace
    volumes:
      - ../../:/workspace:cached
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      SHARING_PORT: 7095
      STORAGE_SERVICE_URL: http://storage:7094
      METADATA_SERVICE_URL: http://metadata:7093
      SHARING_DATABASE_URL: ${SHARING_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/postgres?schema=sharing}
    command: >
      sh -c "node services/sharing/dist/index.js"
    ports:
      - "127.0.0.1:7095:7095"
    depends_on:
      postgres:
        condition: service_healthy
      storage:
        condition: service_started
      metadata:
        condition: service_started
    networks:
      - mywebdrive
    restart: unless-stopped

  # API Gateway
  api-gateway:
    image: node:20-bullseye
    working_dir: /workspace
    volumes:
      - ../../:/workspace:cached
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      GATEWAY_PORT: 9090
      GATEWAY_DATABASE_URL: ${GATEWAY_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/postgres?schema=gateway}
      AUTH_SERVICE_URL: http://auth:7091
      USER_SERVICE_URL: http://user:7092
      METADATA_SERVICE_URL: http://metadata:7093
      STORAGE_SERVICE_URL: http://storage:7094
      SHARING_SERVICE_URL: http://sharing:7095
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
    command: >
      sh -c "node services/api-gateway-node/dist/index.js"
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_started
      user:
        condition: service_started
      metadata:
        condition: service_started
      storage:
        condition: service_started
      sharing:
        condition: service_started
    networks:
      - mywebdrive
    restart: unless-stopped

  # Frontend (Next.js)
  frontend:
    image: node:20-bullseye
    working_dir: /workspace/frontend/cruip-landing
    volumes:
      - ../../:/workspace:cached
    environment:
      NODE_ENV: production
      FRONTEND_PORT: ${FRONTEND_PORT:-3100}
      FRONTEND_HOST: ${FRONTEND_HOST:-0.0.0.0}
      API_BASE_URL: ${API_BASE_URL:-http://api-gateway:9090}
    command: >
      sh -c "HOSTNAME=0.0.0.0 PORT=\"$FRONTEND_PORT\" node .next/standalone/server.js"
    ports:
      - "127.0.0.1:3100:3100"
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - mywebdrive
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  storage_data:

networks:
  mywebdrive:
    driver: bridge

