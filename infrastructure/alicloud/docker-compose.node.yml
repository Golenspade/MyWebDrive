version: '3.8'

# Node-based stack for MyWebDrive (ops deploy variant)
# For simplicity, mirrors the dev compose and mounts repo workspace.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mywebdrive

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - mywebdrive

  auth:
    image: node:20-bullseye
    working_dir: /workspace
    volumes:
      - ../../:/workspace:cached
    environment:
      PNPM_STORE_DIR: /workspace/.pnpm-store
      PNPM_NODE_LINKER: isolated

      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      AUTH_PORT: 7081
      DATABASE_URL: file:./services/auth/prisma/auth.db
    command: >
      sh -lc "node services/auth/dist/index.js"
    ports:
      - "7081:7081"
    networks:
      - mywebdrive

  user:
    image: node:20-bullseye
    working_dir: /workspace
    volumes:
      - ../../:/workspace:cached
    environment:
      PNPM_STORE_DIR: /workspace/.pnpm-store
      PNPM_NODE_LINKER: isolated
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      USER_PORT: 7082
      DATABASE_URL: file:./services/user/prisma/user.db
    command: >
      sh -lc "node services/user/dist/index.js"
    ports:
      - "7082:7082"
    networks:
      - mywebdrive

  metadata:
    image: node:20-bullseye
    working_dir: /workspace
    volumes:
      - ../../:/workspace:cached
    environment:
      PNPM_STORE_DIR: /workspace/.pnpm-store
      PNPM_NODE_LINKER: isolated
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      METADATA_PORT: 7083
      METADATA_DATABASE_URL: file:./services/metadata/prisma/metadata.db
    command: >
      sh -lc "node services/metadata/dist/index.js"
    ports:
      - "7083:7083"
    networks:
      - mywebdrive

  storage:
    image: node:20-bullseye
    working_dir: /workspace
    volumes:
      - ../../:/workspace:cached
    environment:
      PNPM_STORE_DIR: /workspace/.pnpm-store
      PNPM_NODE_LINKER: isolated
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      STORAGE_PORT: 7084
      STORAGE_PATH: ./storage
      METADATA_SERVICE_URL: http://metadata:7083
      STORAGE_DATABASE_URL: file:./services/storage/prisma/storage.db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - minio
      - metadata
    command: >
      sh -lc "node services/storage/dist/index.js"
    ports:
      - "7084:7084"
    networks:
      - mywebdrive

  sharing:
    image: node:20-bullseye
    working_dir: /workspace
    volumes:
      - ../../:/workspace:cached
    environment:
      PNPM_STORE_DIR: /workspace/.pnpm-store
      PNPM_NODE_LINKER: isolated
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      SHARING_PORT: 7085
      STORAGE_SERVICE_URL: http://storage:7084
      METADATA_SERVICE_URL: http://metadata:7083
      SHARING_DATABASE_URL: file:./services/sharing/prisma/sharing.db
    depends_on:
      - storage
      - metadata
    command: >
      sh -lc "node services/sharing/dist/index.js"
    ports:
      - "7085:7085"
    networks:
      - mywebdrive

  api-gateway-node:
    image: node:20-bullseye
    working_dir: /workspace
    volumes:
      - ../../:/workspace:cached
    environment:
      PNPM_STORE_DIR: /workspace/.pnpm-store
      PNPM_NODE_LINKER: isolated
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      GATEWAY_PORT: 9080
      AUTH_SERVICE_URL: http://auth:7081
      USER_SERVICE_URL: http://user:7082
      METADATA_SERVICE_URL: http://metadata:7083
      STORAGE_SERVICE_URL: http://storage:7084
      SHARING_SERVICE_URL: http://sharing:7085
    depends_on:
      - auth
      - user
      - metadata
      - storage
      - sharing
    command: >
      sh -lc "node services/api-gateway-node/dist/index.js"
    ports:
      - "9080:9080"
    networks:
      - mywebdrive

volumes:
  redis_data:
  minio_data:

networks:
  mywebdrive:
    driver: bridge
