version: '3.8'

# Node-based stack for MyWebDrive (ops deploy variant)
# For simplicity, mirrors the dev compose and mounts repo workspace.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mywebdrive

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - mywebdrive

  auth:
    image: node:20-bullseye
    working_dir: /workspace
    volumes:
      - ../../:/workspace:cached
    environment:
      PNPM_STORE_DIR: /workspace/.pnpm-store

      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      AUTH_PORT: 7081
      DATABASE_URL: file:./services/auth/prisma/auth.db
    command: >
      sh -lc "npm config set registry https://registry.npmmirror.com && npm i -g pnpm@9.7.0 && \
      pnpm -r --filter=./packages/* --filter=./services/* install && pnpm -r --filter=./packages/* run build && \
      pnpm --filter=./services/auth run prisma:generate && \
      pnpm --filter=./services/auth run build && \
      (pnpm --filter=./services/auth run migrate:deploy || pnpm --filter=./services/auth exec prisma db push || true) && \
      pnpm --filter=./services/auth run start"
    ports:
      - "7081:7081"
    networks:
      - mywebdrive

  user:
    image: node:20-bullseye
    working_dir: /workspace
    volumes:
      - ../../:/workspace:cached
    environment:
      PNPM_STORE_DIR: /workspace/.pnpm-store
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      USER_PORT: 7082
      DATABASE_URL: file:./services/user/prisma/user.db
    command: >
      sh -lc "npm config set registry https://registry.npmmirror.com && npm i -g pnpm@9.7.0 && \
      pnpm -r --filter=./packages/* --filter=./services/* install && pnpm -r --filter=./packages/* run build && \
      pnpm --filter=./services/user run prisma:generate && \
      pnpm --filter=./services/user run build && \
      (pnpm --filter=./services/user run migrate:deploy || pnpm --filter=./services/user exec prisma db push || true) && \
      pnpm --filter=./services/user run start"
    ports:
      - "7082:7082"
    networks:
      - mywebdrive

  metadata:
    image: node:20-bullseye
    working_dir: /workspace
    volumes:
      - ../../:/workspace:cached
    environment:
      PNPM_STORE_DIR: /workspace/.pnpm-store
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      METADATA_PORT: 7083
      METADATA_DATABASE_URL: file:./services/metadata/prisma/metadata.db
    command: >
      sh -lc "npm config set registry https://registry.npmmirror.com && npm i -g pnpm@9.7.0 && \
      pnpm -r --filter=./packages/* --filter=./services/* install && pnpm -r --filter=./packages/* run build && \
      pnpm --filter=./services/metadata run prisma:generate && \
      pnpm --filter=./services/metadata run build && \
      (pnpm --filter=./services/metadata run migrate:deploy || pnpm --filter=./services/metadata exec prisma db push || true) && \
      pnpm --filter=./services/metadata run start"
    ports:
      - "7083:7083"
    networks:
      - mywebdrive

  storage:
    image: node:20-bullseye
    working_dir: /workspace
    volumes:
      - ../../:/workspace:cached
    environment:
      PNPM_STORE_DIR: /workspace/.pnpm-store

      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      STORAGE_PORT: 7084
      STORAGE_PATH: ./storage
      METADATA_SERVICE_URL: http://metadata:7083
      STORAGE_DATABASE_URL: file:./services/storage/prisma/storage.db
    depends_on:
      - minio
      - metadata
    command: >
      sh -lc "npm config set registry https://registry.npmmirror.com && npm i -g pnpm@9.7.0 && \
      pnpm -r --filter=./packages/* --filter=./services/* install && pnpm -r --filter=./packages/* run build && \
      pnpm --filter=./services/storage run prisma:generate && \
      pnpm --filter=./services/storage run build && \
      (pnpm --filter=./services/storage run migrate:deploy || pnpm --filter=./services/storage exec prisma db push || true) && \
      pnpm --filter=./services/storage run start"
    ports:
      - "7084:7084"
    networks:
      - mywebdrive

  sharing:
    image: node:20-bullseye
    working_dir: /workspace
    volumes:
      - ../../:/workspace:cached
    environment:
      PNPM_STORE_DIR: /workspace/.pnpm-store
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      SHARING_PORT: 7085
      STORAGE_SERVICE_URL: http://storage:7084
      METADATA_SERVICE_URL: http://metadata:7083
      SHARING_DATABASE_URL: file:./services/sharing/prisma/sharing.db
    depends_on:
      - storage
      - metadata
    command: >
      sh -lc "npm config set registry https://registry.npmmirror.com && npm i -g pnpm@9.7.0 && \
      pnpm -r --filter=./packages/* --filter=./services/* install && pnpm -r --filter=./packages/* run build && \
      pnpm --filter=./services/sharing run prisma:generate && \
      pnpm --filter=./services/sharing run build && \
      (pnpm --filter=./services/sharing run migrate:deploy || pnpm --filter=./services/sharing exec prisma db push || true) && \
      pnpm --filter=./services/sharing run start"
    ports:
      - "7085:7085"
    networks:
      - mywebdrive

  api-gateway-node:
    image: node:20-bullseye
    working_dir: /workspace
    volumes:
      - ../../:/workspace:cached
    environment:
      PNPM_STORE_DIR: /workspace/.pnpm-store
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      GATEWAY_PORT: 9080
      AUTH_SERVICE_URL: http://auth:7081
      USER_SERVICE_URL: http://user:7082
      METADATA_SERVICE_URL: http://metadata:7083
      STORAGE_SERVICE_URL: http://storage:7084
      SHARING_SERVICE_URL: http://sharing:7085
    depends_on:
      - auth
      - user
      - metadata
      - storage
      - sharing
    command: >
      sh -lc "npm config set registry https://registry.npmmirror.com && npm i -g pnpm@9.7.0 && \
      pnpm -r --filter=./packages/* --filter=./services/* install && pnpm -r --filter=./packages/* run build && \
      pnpm --filter=./services/api-gateway-node run build && \
      pnpm --filter=./services/api-gateway-node run start"
    ports:
      - "9080:9080"
    networks:
      - mywebdrive

volumes:
  redis_data:
  minio_data:

networks:
  mywebdrive:
    driver: bridge

