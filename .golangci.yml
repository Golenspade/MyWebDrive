# golangci-lint 配置文件
# 采用"先宽后严"的原则，逐步提升代码质量

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
  skip-dirs:
    - vendor
    - node_modules
    - frontend
    - logs
    - storage
    - data
  skip-files:
    - ".*\\.pb\\.go$"
    - ".*_mock\\.go$"
    - ".*_test\\.go$"  # 暂时跳过测试文件，避免初期过多报错
  modules-download-mode: readonly

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  uniq-by-line: true

linters:
  enable:
    # 基础代码质量检查
    - gofmt          # 格式化检查
    - goimports      # import 排序
    - govet          # Go 官方检查工具
    - errcheck       # 错误处理检查
    - staticcheck    # 静态分析
    - unused         # 未使用代码检查
    - ineffassign    # 低效赋值检查
    - typecheck      # 类型检查
    
    # 代码复杂度控制 (先宽松)
    - gocyclo        # 圈复杂度
    - funlen         # 函数长度
    - gocognit       # 认知复杂度
    
    # 代码风格 (渐进式)
    - gosimple       # 简化代码建议
    - misspell       # 拼写检查
    - unconvert      # 不必要类型转换
    - whitespace     # 空白符检查
    
    # 潜在bug检查
    - gosec          # 安全检查 (宽松模式)
    - bodyclose      # HTTP body 关闭检查
    - rowserrcheck   # SQL rows.Err() 检查
    - sqlclosecheck  # SQL 连接关闭检查

  disable:
    # 暂时禁用较严格的检查，后续阶段逐步开启
    - dupl           # 重复代码检查 (后续开启)
    - goconst        # 常量提取建议 (后续开启)
    - gocritic       # 严格的代码审查 (后续开启)
    - golint         # 已废弃，使用 revive 替代
    - maligned       # 已废弃
    - interfacer     # 已废弃
    - scopelint      # 已废弃

linters-settings:
  # 函数长度限制 (先宽松)
  funlen:
    lines: 100      # 最大行数
    statements: 50  # 最大语句数
    
  # 圈复杂度限制
  gocyclo:
    min-complexity: 15  # 较宽松的复杂度限制
    
  # 认知复杂度
  gocognit:
    min-complexity: 20  # 较宽松的认知复杂度
    
  # 错误检查配置
  errcheck:
    check-type-assertions: true
    check-blank: true
    exclude-functions:
      - (*os.File).Close
      - (io.Closer).Close
      
  # 安全检查配置 (宽松模式)
  gosec:
    severity: medium
    confidence: medium
    excludes:
      - G101  # 暂时忽略硬编码密码检查，后续处理
      - G104  # 暂时忽略某些错误未处理
      
  # 静态分析配置
  staticcheck:
    go: "1.21"
    checks: ["all", "-ST1000", "-ST1003"]  # 暂时忽略包注释和导出函数注释要求
    
  # 导入排序
  goimports:
    local-prefixes: mywebdrive.local
    
  # 拼写检查
  misspell:
    locale: US
    ignore-words:
      - colour
      - flavour
      
issues:
  # 最大问题数量限制，避免初期过多输出
  max-issues-per-linter: 50
  max-same-issues: 10
  
  # 新代码优先 - 只检查最近修改的文件
  new: false  # 暂时检查所有文件，建立基线
  
  # 排除特定问题
  exclude-rules:
    # 排除长行警告在生成的代码中
    - path: ".*\\.pb\\.go"
      linters:
        - all
        
    # 排除测试文件的某些检查
    - path: "_test\\.go"
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
        
    # 排除 main.go 的函数长度检查（初期）
    - path: "main\\.go"
      linters:
        - funlen
        
    # 临时排除常见但非关键的问题
    - text: "should have comment"
      linters:
        - golint
        - revive
        
    - text: "don't use ALL_CAPS in Go names"
      linters:
        - golint
        - revive
        
  # 包含未导出的问题
  exclude-use-default: false
  
severity:
  # 默认严重程度
  default-severity: error
  
  # 不同检查器的严重程度设置
  rules:
    - linters: [misspell]
      severity: warning
    - linters: [gosec]
      severity: warning  # 安全问题先设为警告
    - linters: [gocyclo, funlen, gocognit]
      severity: warning  # 复杂度问题先设为警告